name: disaster-data-cleaner
version: 1.0.0
description: >
  Real-world environment for cleaning disaster datasets (India/South Asia)
  with missing values, invalid coordinates, duplicates, and severity prediction.
  Three tasks: easy (impute + dtype correction), medium (+ geo/date validation),
  hard (+ duplicate removal + prediction).

tasks:
  - name: easy
    description: Impute missing values and correct data types.
    grader: EasyGrader
  - name: medium
    description: All easy steps plus coordinate and date validation.
    grader: MediumGrader
  - name: hard
    description: Full cleaning, duplicate removal, and severity prediction.
    grader: HardGrader

entry_point: environment.py:DisasterCleanerEnv
observation_model: DisasterObservation
action_model: DisasterAction
reward_model: DisasterReward
